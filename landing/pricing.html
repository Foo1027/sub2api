<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIFoo.cc.cd / 模型价格</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --canvas: #090909;
        --canvas-soft: #111317;
        --canvas-card: rgba(255, 255, 255, 0.03);
        --canvas-card-strong: rgba(255, 255, 255, 0.05);
        --ink: #ffffff;
        --body: #d9dbe2;
        --mute: #7a7f88;
        --hairline: rgba(255, 255, 255, 0.12);
        --hairline-strong: rgba(255, 255, 255, 0.22);
        --accent-sunset: #ff7a17;
        --accent-sunset-rgb: 255, 122, 23;
        --accent-ember: #ffb277;
        --accent-ember-rgb: 255, 178, 119;
        --accent-breeze: #9cc0e9;
        --accent-dusk: #7258ff;
        --good: #7ff0b0;
        --pill: 999px;
        --section-gap: 18px;
        --theme-duration: 180ms;
        --theme-ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      body[data-theme="light"] {
        --canvas: #f3f0ea;
        --canvas-soft: #ffffff;
        --canvas-card: transparent;
        --canvas-card-strong: transparent;
        --ink: #15191a;
        --body: #4f525a;
        --mute: #8b8f97;
        --hairline: rgba(23, 21, 26, 0.1);
        --hairline-strong: rgba(23, 21, 26, 0.16);
        --accent-sunset: #d45f14;
        --accent-sunset-rgb: 212, 95, 20;
        --accent-ember: #b65c24;
        --accent-ember-rgb: 182, 92, 36;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        --page-shift-y: 0px;
        --page-opacity: 1;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 0%, rgba(var(--accent-sunset-rgb), 0.08), transparent 24%),
          radial-gradient(circle at 82% 10%, rgba(124, 58, 237, 0.08), transparent 26%),
          linear-gradient(180deg, #080808 0%, #0a0a0a 28%, #0d1116 100%);
        font-family: "Space Grotesk", Inter, "SF Pro Display", "Segoe UI", sans-serif;
      }

      body.is-page-entering,
      body.is-page-leaving {
        overflow: hidden;
      }

      body.is-page-entering {
        --page-shift-y: 16px;
        --page-opacity: 0;
      }

      body.is-page-leaving {
        --page-shift-y: -10px;
        --page-opacity: 0;
        pointer-events: none;
      }

      body[data-theme="light"] {
        background:
          radial-gradient(circle at 18% 0%, rgba(var(--accent-sunset-rgb), 0.12), transparent 26%),
          radial-gradient(circle at 82% 12%, rgba(124, 58, 237, 0.09), transparent 28%),
          linear-gradient(180deg, #faf6ef 0%, #f4efe8 30%, #eee9e1 100%);
      }

      html[data-embedded="true"],
      body[data-embedded="true"] {
        background: transparent;
      }

      body,
      .topbar,
      .button,
      .button-solid,
      .theme-toggle,
      .hero,
      .tabs,
      .tab,
      .rule,
      .surface,
      .selector-shell,
      .detail-shell,
      .table-wrap,
      .group-note,
      .selector-card,
      .toggle-button,
      .copy-button,
      .selector-badge,
      .brand-dot,
      .product-mark,
      .pricing-app {
        transition:
          color var(--theme-duration) var(--theme-ease),
          background-color var(--theme-duration) var(--theme-ease),
          border-color var(--theme-duration) var(--theme-ease),
          box-shadow var(--theme-duration) var(--theme-ease);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 128px 0 72px;
        opacity: var(--page-opacity);
        transform: translateY(var(--page-shift-y));
        transition:
          transform 360ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 320ms ease;
      }

      body[data-embedded="true"] .shell {
        padding: 0 0 32px;
      }

      .topbar {
        position: fixed;
        top: 18px;
        left: 50%;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: min(1180px, calc(100vw - 32px));
        min-height: 92px;
        padding: 14px 18px;
        border: 1px solid var(--hairline);
        border-radius: var(--pill);
        background: rgba(10, 10, 10, 0.78);
        backdrop-filter: blur(18px);
        transform: translateX(-50%) translateY(var(--page-shift-y));
        opacity: var(--page-opacity);
        transition:
          transform 360ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 320ms ease,
          color var(--theme-duration) var(--theme-ease),
          background-color var(--theme-duration) var(--theme-ease),
          border-color var(--theme-duration) var(--theme-ease),
          box-shadow var(--theme-duration) var(--theme-ease);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-sunset), var(--accent-dusk), var(--accent-breeze));
      }

      .brand-copy strong {
        display: block;
        font-size: 14px;
        font-weight: 400;
      }

      .brand-copy span,
      .eyebrow,
      .mini,
      th,
      .cell-kicker {
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .brand-copy span,
      .mini,
      .cell-kicker {
        color: var(--mute);
        font-size: 11px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .button,
      .button-solid {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: var(--pill);
        border: 1px solid var(--hairline-strong);
        font-size: 13px;
      }

      .button-solid {
        background: #ffffff;
        color: #0a0a0a;
        border-color: #ffffff;
      }

      body[data-theme="light"] .topbar {
        background: rgba(255, 252, 246, 0.8);
      }

      body[data-theme="light"] .button-solid {
        background: #ffffff;
        color: #15191a;
        border-color: #ffffff;
      }

      .theme-toggle {
        width: 40px;
        min-width: 40px;
        min-height: 40px;
        padding: 0;
        background: transparent;
        color: var(--ink);
        border-color: var(--hairline-strong);
        box-shadow: none;
      }

      .theme-toggle svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition:
          color var(--theme-duration) var(--theme-ease),
          stroke var(--theme-duration) var(--theme-ease),
          opacity 220ms ease;
      }

      .theme-toggle .icon-sun {
        display: none;
      }

      body[data-theme="light"] .theme-toggle .icon-moon {
        display: none;
      }

      body[data-theme="light"] .theme-toggle .icon-sun {
        display: block;
      }

      body[data-theme="light"] .theme-toggle {
        background: transparent;
        color: var(--ink);
        border-color: var(--hairline-strong);
        box-shadow: none;
      }

      .hero {
        padding: 0 0 var(--section-gap);
      }

      body[data-embedded="true"] .hero {
        padding: 0 0 26px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 18px;
        color: var(--body);
        font-size: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h2,
      h3 {
        font-weight: 400;
        letter-spacing: -0.045em;
      }

      h1 {
        font-size: 28px;
        line-height: 1.15;
      }

      h2 {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1;
      }

      h3 {
        font-size: clamp(28px, 3.6vw, 36px);
        line-height: 1;
      }

      .lead {
        max-width: 880px;
        margin-top: 18px;
        color: var(--body);
        font-size: 18px;
        line-height: 1.85;
      }

      .stack {
        display: grid;
        gap: var(--section-gap);
      }

      body[data-embedded="true"] .stack {
        gap: 22px;
      }

      .tabs,
      .rule,
      .surface,
      .selector-shell,
      .detail-shell,
      .table-wrap {
        border: 1px solid var(--hairline);
        border-radius: 22px;
        background: rgba(19, 21, 26, 0.9);
      }

      body[data-theme="light"] .tabs,
      body[data-theme="light"] .rule,
      body[data-theme="light"] .surface,
      body[data-theme="light"] .selector-shell,
      body[data-theme="light"] .detail-shell,
      body[data-theme="light"] .table-wrap,
      body[data-theme="light"] .group-note {
        background: transparent;
        box-shadow: none;
      }

      body[data-embedded="true"] .tabs,
      body[data-embedded="true"] .rule {
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .tabs,
      .rule,
      .surface,
      .selector-shell,
      .detail-shell {
        padding: 18px;
      }

      .tab-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 260px));
        gap: 12px;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 14px;
        justify-content: center;
        width: 100%;
        padding: 16px 18px;
        border: 1px solid var(--hairline);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        color: var(--body);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          color 180ms ease,
          transform 180ms ease;
      }

      .tab:hover,
      .tab:focus-visible,
      .selector-card:hover,
      .selector-card:focus-visible,
      .toggle-button:hover,
      .toggle-button:focus-visible,
      .copy-button:hover,
      .copy-button:focus-visible {
        outline: none;
        border-color: rgba(var(--accent-sunset-rgb), 0.4);
      }

      .tab.is-active {
        color: var(--ink);
        border-color: rgba(var(--accent-sunset-rgb), 0.38);
        background: linear-gradient(180deg, rgba(var(--accent-sunset-rgb), 0.12), rgba(255, 255, 255, 0.02));
        transform: translateY(-1px);
      }

      body[data-theme="light"] .tab,
      body[data-theme="light"] .selector-card,
      body[data-theme="light"] .stat,
      body[data-theme="light"] .toggle-button {
        background: transparent;
        color: #15191a;
      }

      body[data-theme="light"] .tab.is-active,
      body[data-theme="light"] .selector-card.is-active,
      body[data-theme="light"] .toggle-button.is-active {
        background: transparent;
        color: #15191a;
        box-shadow: inset 0 0 0 1px rgba(var(--accent-sunset-rgb), 0.12);
      }

      .brand-mark,
      .product-mark {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: currentColor;
        flex: 0 0 auto;
      }

      .brand-mark svg,
      .product-mark svg,
      .brand-mark img,
      .product-mark img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .tab-copy strong,
      .surface-copy strong {
        display: block;
        font-size: 16px;
        font-weight: 500;
      }

      .tab-copy strong {
        font-family: "Space Grotesk", Inter, "SF Pro Display", "Segoe UI", sans-serif;
        letter-spacing: -0.02em;
      }

      .tab-copy {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .tab-copy span,
      .surface-copy span {
        display: block;
        margin-top: 3px;
        color: var(--mute);
        font-size: 12px;
      }

      .rule {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 460px);
        gap: 24px;
        align-items: start;
      }

      .rule-copy {
        min-width: 0;
      }

      .rule p,
      .surface p,
      .detail-note,
      .selector-meta,
      td {
        color: var(--body);
        font-size: 14px;
        line-height: 1.8;
      }

      .rule-example {
        width: min(100%, 460px);
        justify-self: end;
        align-self: start;
        margin-top: 10px;
        text-align: left;
        overflow-wrap: anywhere;
      }

      .group-note {
        border: 1px solid var(--hairline);
        border-radius: 22px;
        background: rgba(19, 21, 26, 0.9);
        padding: 18px;
      }

      body[data-embedded="true"] .selector-shell,
      body[data-embedded="true"] .detail-shell,
      body[data-embedded="true"] .table-wrap,
      body[data-embedded="true"] .group-note {
        background: transparent;
        box-shadow: none;
      }

      body[data-embedded="true"][data-theme="light"] .selector-shell,
      body[data-embedded="true"][data-theme="light"] .detail-shell,
      body[data-embedded="true"][data-theme="light"] .table-wrap,
      body[data-embedded="true"][data-theme="light"] .group-note {
        background: transparent;
        box-shadow: none;
      }

      body[data-embedded="true"] .selector-card,
      body[data-embedded="true"] .stat {
        background: transparent;
      }

      body[data-embedded="true"] .selector-card.is-active,
      body[data-embedded="true"] .toggle-button.is-active {
        background: transparent;
        box-shadow: inset 0 0 0 1px rgba(var(--accent-sunset-rgb), 0.18);
      }

      body[data-embedded="true"][data-theme="light"] .selector-card,
      body[data-embedded="true"][data-theme="light"] .stat,
      body[data-embedded="true"][data-theme="light"] .tab,
      body[data-embedded="true"][data-theme="light"] .toggle-button {
        background: transparent;
      }

      body[data-embedded="true"][data-theme="light"] .selector-card.is-active,
      body[data-embedded="true"][data-theme="light"] .tab.is-active,
      body[data-embedded="true"][data-theme="light"] .toggle-button.is-active {
        background: transparent;
        box-shadow: inset 0 0 0 1px rgba(var(--accent-sunset-rgb), 0.18);
      }

      .pricing-app {
        margin-top: var(--section-gap);
        min-height: calc(100vh - 180px);
        padding: 0 0 28px;
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(12, 14, 18, 0.08) 0%, rgba(12, 14, 18, 0.18) 16%, rgba(12, 14, 18, 0.46) 100%);
      }

      body[data-theme="light"] .pricing-app {
        background: transparent;
      }

      body[data-embedded="true"] .pricing-app {
        margin-top: 24px;
        min-height: 0;
        padding: 0;
        border-radius: 0;
        background: transparent;
      }

      body[data-theme="light"] .rule-example {
        color: var(--body);
      }

      .surface {
        display: grid;
        gap: var(--section-gap);
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
      }

      .surface-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .selector-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .selector-copy {
        display: grid;
        gap: 10px;
      }

      .selector-actions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        flex-wrap: wrap;
      }

      .selector-intro {
        color: var(--body);
        font-size: 14px;
        line-height: 1.8;
      }

      .selector-title {
        color: var(--ink);
        font-size: 18px;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: -0.02em;
      }

      .surface-copy {
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }

      .surface-copy .product-mark {
        width: 30px;
        height: 30px;
        margin-top: 2px;
      }

      .toggle {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .toggle-button {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--hairline);
        border-radius: var(--pill);
        background: transparent;
        color: var(--body);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          color 180ms ease;
      }

      .toggle-button.is-active {
        color: var(--ink);
        border-color: rgba(var(--accent-sunset-rgb), 0.38);
        background: rgba(var(--accent-sunset-rgb), 0.1);
      }

      .selector-shell {
        display: grid;
        gap: 14px;
      }

      .selector-grid {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(248px, 280px);
        gap: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 6px;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(var(--accent-sunset-rgb), 0.28) transparent;
      }

      .selector-grid::-webkit-scrollbar {
        height: 8px;
      }

      .selector-grid::-webkit-scrollbar-track {
        background: transparent;
      }

      .selector-grid::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(var(--accent-sunset-rgb), 0.28);
      }

      .selector-card {
        width: 100%;
        min-width: 0;
        padding: 18px;
        border: 1px solid var(--hairline);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
        color: var(--body);
        text-align: left;
        cursor: pointer;
        scroll-snap-align: start;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease,
          color 180ms ease;
      }

      .selector-card.is-active {
        color: var(--ink);
        border-color: rgba(var(--accent-sunset-rgb), 0.42);
        background:
          linear-gradient(180deg, rgba(var(--accent-sunset-rgb), 0.14), rgba(255, 255, 255, 0.02)),
          rgba(255, 255, 255, 0.02);
        box-shadow: inset 0 0 0 1px rgba(var(--accent-sunset-rgb), 0.12);
      }

      .selector-card strong {
        display: block;
        font-weight: 500;
        font-size: 20px;
      }

      .selector-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 10px;
        border-radius: var(--pill);
        background: rgba(var(--accent-sunset-rgb), 0.12);
        color: var(--accent-ember);
        font-size: 11px;
      }

      body[data-theme="light"] .selector-badge {
        color: var(--accent-ember);
        background: rgba(var(--accent-sunset-rgb), 0.12);
      }

      .selector-meta {
        margin-top: 10px;
        color: var(--mute);
        line-height: 1.6;
      }

      .detail-shell {
        overflow: hidden;
      }

      .detail-top {
        display: block;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--hairline);
      }

      .detail-note {
        max-width: 760px;
        margin-top: 14px;
      }

      .detail-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .stat {
        padding: 14px 16px;
        border: 1px solid var(--hairline);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.04em;
      }

      .table-wrap {
        overflow: hidden;
        margin-top: 14px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 16px 18px;
        text-align: left;
        border-top: 1px solid var(--hairline);
        vertical-align: top;
      }

      tbody td:first-child {
        vertical-align: middle;
      }

      tbody td:last-child {
        vertical-align: middle;
      }

      th {
        color: var(--mute);
        font-size: 12px;
        font-weight: 500;
      }

      thead th:last-child {
        padding-left: 16px;
      }

      .model-cell {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
      }

      .model-id {
        color: var(--ink);
        font-weight: 500;
        font-size: 16px;
        line-height: 1.25;
      }

      .model-head {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .copy-button {
        width: 20px;
        height: 20px;
        padding: 0;
        border: none;
        border-radius: 0;
        background: none;
        color: var(--mute);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          border-color 180ms ease,
          color 180ms ease,
          background 180ms ease;
      }

      .copy-button svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .copy-button.is-copied {
        color: var(--accent-ember);
      }

      body[data-theme="light"] .copy-button.is-copied {
        color: var(--accent-ember);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .price-main {
        display: inline-block;
        color: var(--accent-ember);
        font-size: 18px;
        line-height: 1;
        letter-spacing: -0.05em;
        font-weight: 400;
      }

      body[data-theme="light"] .price-main {
        color: #d26a2a;
      }

      .price-stack {
        display: flex;
        flex-direction: column;
      }

        `;
      }

77 14.2479 10.7175L14.2424 21.9419ZM16.071 17.9991L20.4018 15.4978L24.7325 17.9975V22.9985L20.4018 25.4983L16.071 22.9985V17.9991Z" fill="currentColor"></path>
          </svg>
        `;
      }

      function productIcon(productId) {
        return productId === "claude" ? claudeIcon() : codexIcon();
      }

      function getProduct(productId) {
        return pricingData.find((product) => product.id === productId);
      }

      function getActiveGroup(product) {
        return product.groups.find((group) => group.id === state.groupIds[product.id]) || product.groups[0];
      }

      function renderTabs() {
        tabsRoot.innerHTML = pricingData
          .map((product) => {
            const active = state.productId === product.id ? " is-active" : "";
            return `
              <button class="tab${active}" type="button" data-product="${product.id}" aria-pressed="${state.productId === product.id}">
                <span class="brand-mark">${productIcon(product.id)}</span>
                <span class="tab-copy">
                  <strong>${product.name}</strong>
                  <span>${product.sublabel}</span>
                </span>
              </button>
            `;
          })
          .join("");
      }

      function renderRuleExample() {
        ruleExampleRoot.textContent = ruleExamples[state.productId] || ruleExamples.claude;
      }

      function formatPriceCell(cell) {
        const main = state.mode === "grouped" ? cell.group : cell.official;
        const support = state.mode === "grouped" ? `官方价格 ${cell.official}` : `当前分组价 ${cell.group}`;
        return `
          <div class="price-stack${state.mode === "official" ? " is-official" : ""}">
            <div class="price-line">
              <span class="price-main">${main}</span><span class="price-unit">/ 1M tokens</span>
            </div>
            ${state.mode === "grouped" ? `<span class="price-sub">${support}</span>` : ""}
          </div>
        `;
      }

      const modelLabelMap = {
        "claude-opus-4-7": "Claude Opus 4.7",
        "claude-opus-4-6": "Claude Opus 4.6",
        "claude-sonnet-4-6": "Claude Sonnet 4.6",
        "claude-haiku-4-5": "Claude Haiku 4.5",
        "gpt-5.5": "GPT 5.5",
        "gpt-5.4": "GPT 5.4",
        "gpt-5.4-mini": "GPT 5.4 Mini",
        "gpt-5.2": "GPT 5.2",
        "gpt-5.3-codex": "GPT 5.3 Codex"
      };

      function getModelLabel(modelId) {
        return modelLabelMap[modelId] || modelId;
      }

      function copyIcon() {
        return `
          <svg viewBox="0 0 16 16" aria-hidden="true" fill="none">
            <rect x="5.5" y="2.5" width="7" height="8.5" rx="1.7" stroke="currentColor" stroke-width="1.2"></rect>
            <path d="M4.5 5.5H4C2.9 5.5 2 6.4 2 7.5V11C2 12.1 2.9 13 4 13H8.5C9.6 13 10.5 12.1 10.5 11V10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
          </svg>
        `;
      }

      function copiedIcon() {
        return `
          <svg viewBox="0 0 16 16" aria-hidden="true" fill="none">
            <path d="M3.5 8.5L6.3 11.3L12.5 5.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        `;
      }

      function renderSurface() {
        const product = getProduct(state.productId);
        const activeGroup = getActiveGroup(product);

        appRoot.innerHTML = `
          <section class="surface">
            <section class="selector-shell">
              <div class="selector-head">
                <div class="selector-copy">
                  <div class="selector-title">价格分组</div>
                </div>
                <div class="selector-actions">
                  <div class="selector-intro">选择分组 直接查看每个模型的人民币价格</div>
                  <div class="toggle" role="tablist" aria-label="价格模式">
                    <button class="toggle-button${state.mode === "grouped" ? " is-active" : ""}" type="button" data-mode="grouped" aria-pressed="${state.mode === "grouped"}">分组价格</button>
                    <button class="toggle-button${state.mode === "official" ? " is-active" : ""}" type="button" data-mode="official" aria-pressed="${state.mode === "official"}">官方价格</button>
                  </div>
                </div>
              </div>
              <div class="selector-grid">
                ${product.groups
                  .map((group) => {
                    const active = group.id === activeGroup.id ? " is-active" : "";
                    return `
                      <button class="selector-card${active}" type="button" data-group="${group.id}" aria-pressed="${group.id === activeGroup.id}">
                        <span class="selector-badge">${group.badge}</span>
                        <strong style="margin-top: 12px;">${group.name}</strong>
                        <div class="selector-meta">${group.multiplier}</div>
                      </button>
                    `;
                  })
                  .join("")}
              </div>
            </section>

            <section class="group-note">
              <div class="mini">分组介绍</div>
              <p>${groupNotes[state.productId] || groupNotes.claude}</p>
            </section>

            <section class="detail-shell">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>模型 ID</th>
                      ${product.columns.map((column) => `<th>${column.label}</th>`).join("")}
                      <th>${state.mode === "grouped" ? "节省幅度" : "描述"}</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${activeGroup.rows
                      .map(
                        (row) => `
                          <tr>
                            <td>
                              <div class="model-cell">
                                <div>
                                  <span class="model-head">
                                    <span class="model-id">${row.model}</span>
                                    <button class="copy-button" type="button" data-copy="${row.model}" aria-label="复制 ${row.model}" title="复制 ${row.model}">
                                      ${copyIcon()}
                                      <span class="sr-only">复制 ${row.model}</span>
                                    </button>
                                  </span>
                                </div>
                              </div>
                            </td>
                            ${product.columns.map((column) => `<td class="price-cell${state.mode === "official" ? " is-official" : ""}">${formatPriceCell(row[column.key])}</td>`).join("")}
                            <td><span class="save${state.mode === "official" ? " is-neutral" : ""}">${state.mode === "grouped" ? row.save : getModelLabel(row.model)}</span></td>
                          </tr>
                        `
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            </section>
          </section>
        `;
      }

      function render() {
        renderTabs();
        renderRuleExample();
        renderSurface();
      }

      tabsRoot.addEventListener("click", (event) => {
        const button = event.target.closest("[data-product]");
        if (!button) return;
        state.productId = button.dataset.product;
        render();
      });

      appRoot.addEventListener("click", async (event) => {
        const modeButton = event.target.closest("[data-mode]");
        if (modeButton) {
          state.mode = modeButton.dataset.mode;
          render();
          return;
        }

        const groupButton = event.target.closest("[data-group]");
        if (groupButton) {
          state.groupIds[state.productId] = groupButton.dataset.group;
          render();
          return;
        }

        const copyButton = event.target.closest("[data-copy]");
        if (!copyButton) return;

        const value = copyButton.dataset.copy;

        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(value);
          } else {
            const helper = document.createElement("textarea");
            helper.value = value;
            helper.setAttribute("readonly", "");
            helper.style.position = "absolute";
            helper.style.left = "-9999px";
            document.body.appendChild(helper);
            helper.select();
            document.execCommand("copy");
            document.body.removeChild(helper);
          }

          copyButton.innerHTML = copiedIcon();
          copyButton.setAttribute("aria-label", `已复制 ${value}`);
          copyButton.setAttribute("title", `已复制 ${value}`);
          copyButton.classList.add("is-copied");
          window.setTimeout(() => {
            copyButton.innerHTML = copyIcon();
            copyButton.setAttribute("aria-label", `复制 ${value}`);
            copyButton.setAttribute("title", `复制 ${value}`);
            copyButton.classList.remove("is-copied");
          }, 1200);
        } catch (error) {
          copyButton.innerHTML = copyIcon();
          copyButton.setAttribute("aria-label", `复制失败 ${value}`);
          copyButton.setAttribute("title", `复制失败 ${value}`);
          window.setTimeout(() => {
            copyButton.innerHTML = copyIcon();
            copyButton.setAttribute("aria-label", `复制 ${value}`);
            copyButton.setAttribute("title", `复制 ${value}`);
          }, 1200);
        }
      });

      setupPageTransitions();
      render();
    </script>
  </body>
</html>
