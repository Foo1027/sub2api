server {
  listen 8080;
  server_name aifoo.cc.cd www.aifoo.cc.cd;

  root /usr/share/nginx/html;
  index index.html;

  set $shell_bootstrap '<script>(function(){function pathFrom(url){try{return url?new URL(url,location.href).pathname:location.pathname}catch(e){return location.pathname}}function sync(path){var root=document.documentElement;var isAuth=/^\/(login|register|forgot-password|reset-password|email-verify)$/.test(path);var isConsole=/^\/(dashboard|keys|usage|channel-status|purchase|orders|subscriptions|redeem|affiliate|profile|available-channels|admin(?:\/.*)?)$/.test(path);root.classList.toggle("auth-shell-pending",isAuth);root.classList.toggle("console-shell-pending",isConsole)}var push=history.pushState;var replace=history.replaceState;history.pushState=function(state,title,url){sync(pathFrom(url));return push.apply(this,arguments)};history.replaceState=function(state,title,url){sync(pathFrom(url));return replace.apply(this,arguments)};window.addEventListener("popstate",function(){sync(location.pathname)});window.addEventListener("hashchange",function(){sync(location.pathname)});sync(location.pathname);}())</script>';

  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /home {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /index.html {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /pricing.html {
    try_files /pricing.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /docs-nodejs.html {
    try_files /docs-nodejs.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /aifoo-docs-api-scripts.js {
    try_files /aifoo-docs-api-scripts.js =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-override.css {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-preload.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-theme-toggle.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-override.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /console-override.css {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /console-override.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /landing-assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ~ ^/(login|register|forgot-password|reset-password|email-verify)$ {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '</head>' '$shell_bootstrap<link rel="stylesheet" href="/auth-override.css"><link rel="stylesheet" href="/console-override.css"><script src="/auth-preload.js" defer></script><script src="/auth-theme-toggle.js" defer></script><script src="/auth-override.js" defer></script><script src="/console-override.js" defer></script></head>';
  }

  location ~ ^/(dashboard|keys|usage|channel-status|purchase|orders|subscriptions|redeem|affiliate|profile|available-channels|admin(?:/.*)?)$ {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '</head>' '$shell_bootstrap<link rel="stylesheet" href="/auth-override.css"><link rel="stylesheet" href="/console-override.css"><script src="/auth-preload.js" defer></script><script src="/auth-theme-toggle.js" defer></script><script src="/auth-override.js" defer></script><script src="/console-override.js" defer></script></head>';
  }

  location ^~ /v1/ {
    client_max_body_size 50m;
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 8080 default_server;
  server_name _;

  location = / {
    return 302 /login;
  }

  location = /home {
    return 302 /login;
  }

  location ^~ /v1/ {
    client_max_body_size 50m;
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
