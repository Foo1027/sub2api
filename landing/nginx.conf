server {
  listen 8080;
  server_name aifoo.cc.cd www.aifoo.cc.cd;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location = /home {
    try_files /index.html =404;
  }

  location = /index.html {
    try_files /index.html =404;
  }

  location = /pricing.html {
    try_files /pricing.html =404;
  }

  location = /docs-nodejs.html {
    try_files /docs-nodejs.html =404;
  }

  location = /aifoo-docs-api-scripts.js {
    try_files /aifoo-docs-api-scripts.js =404;
  }

  location /landing-assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 8080 default_server;
  server_name _;

  location = / {
    return 302 /login;
  }

  location = /home {
    return 302 /login;
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
