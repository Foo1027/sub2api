server {
  listen 8080;
  server_name aifoo.cc.cd www.aifoo.cc.cd;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /home {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /index.html {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /pricing.html {
    try_files /pricing.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /docs-nodejs.html {
    try_files /docs-nodejs.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /aifoo-docs-api-scripts.js {
    try_files /aifoo-docs-api-scripts.js =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-override.css {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-preload.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /auth-theme-toggle.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /console-override.css {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /console-override.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /landing-assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ~ ^/(login|register|forgot-password|reset-password|email-verify)$ {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '</head>' '<link rel="stylesheet" href="/auth-override.css"><script src="/auth-preload.js" defer></script><script src="/auth-theme-toggle.js" defer></script></head>';
  }

  location ~ ^/(dashboard|keys|usage|channel-status|purchase|orders|subscriptions|redeem|affiliate|profile|available-channels)$ {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '</head>' '<link rel="stylesheet" href="/console-override.css"><script src="/console-override.js" defer></script></head>';
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 8080 default_server;
  server_name _;

  location = / {
    return 302 /login;
  }

  location = /home {
    return 302 /login;
  }

  location / {
    proxy_pass http://sub2api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
